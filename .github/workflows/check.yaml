name: check

on:
  push:
    branches: ["main"]
    tags: [v0.*]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            full: true

          - name: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            full: true

          - name: macOS
            os: macos-latest
            target: aarch64-apple-darwin
            full: true

          - name: iOS
            os: macos-latest
            target: aarch64-apple-ios
            full: false

          - name: Web
            os: ubuntu-latest
            target: wasm32-unknown-unknown
            full: false

          - name: Android
            os: ubuntu-latest
            target: aarch64-linux-android
            full: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal --target ${{ matrix.target }}
          rustup default stable

      - name: Check Basics
        run: cargo check --target ${{ matrix.target }} --workspace --no-default-features

      - name: Test CPU Basics
        if: matrix.full
        run: cargo test -p blade-render --no-default-features

      - name: Test CPU Workspace
        if: matrix.full
        run: cargo test --workspace --all-features

      - name: Test GLES
        if: matrix.name == 'Linux'
        run: cargo build --example bunnymark
        env:
          RUSTFLAGS: "--cfg gles"

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MSRV toolchain
        run: |
          rustup toolchain install 1.88.0 --profile minimal
          rustup default 1.88.0

      - name: Check MSRV
        run: cargo check --workspace --no-default-features

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - name: Run rustfmt
        run: cargo fmt -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustup default stable

      - name: Run clippy
        run: cargo clippy --workspace --all-targets

  gpu-test:
    name: GPU Tests (${{ matrix.name }})
    strategy:
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
          - name: macOS
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install Vulkan (Linux)
        if: matrix.name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers

      - name: Run GPU integration tests
        run: |
          cargo test --test gpu_examples -- --ignored --nocapture
        env:
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.json
