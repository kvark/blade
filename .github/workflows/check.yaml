name: check

on:
  push:
    branches: ["main"]
    tags: [v0.*]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            full: true

          - name: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            full: true

          - name: macOS
            os: macos-latest
            target: aarch64-apple-darwin
            full: true

          - name: iOS
            os: macos-latest
            target: aarch64-apple-ios
            full: false

          - name: Web
            os: ubuntu-latest
            target: wasm32-unknown-unknown
            full: false

          - name: Android
            os: ubuntu-latest
            target: aarch64-linux-android
            full: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v3

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          target: ${{ matrix.target }}
          override: true

      - name: Check Basics
        uses: actions-rs/cargo@v1
        with:
          command: check
          args: --target ${{ matrix.target }} --workspace --all --no-default-features

      - name: Test CPU Basics
        if: matrix.full
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: -p blade-render --no-default-features

      - name: Test CPU Workspace
        if: matrix.full
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --workspace --all-features

      - name: Test GLES
        if: matrix.name == 'Linux'
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --example bunnymark
        env:
          RUSTFLAGS: "--cfg gles"

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v3

      - name: install rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: rustfmt

      - name: run rustfmt
        run: |
          cargo fmt -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v3

      - name: install rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: clippy

      - name: run clippy
        run: |
          cargo clippy -p blade-engine -p blade-render -p blade-graphics --all-targets

  gpu-test:
    name: GPU Tests (${{ matrix.name }})
    strategy:
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
          - name: macOS
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v3

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install Vulkan (Linux)
        if: matrix.name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers

      - name: Run GPU integration tests
        run: |
          cargo test --test gpu_examples -- --ignored --nocapture
        env:
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.json
